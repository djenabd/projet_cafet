<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <title>Espace Étudiants - Cafet Panini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
    
        body { background-color: #eeeeee; font-family: Arial, sans-serif; }
        .mon-bloc-blanc {
            background-color: white;
            width: 70%;
            margin: 40px auto;
            padding: 30px;
            border: 2px solid #dddddd;
            border-radius: 10px;
            text-align: center;
        }
        .mon-footer { background-color: #333333; color: white; padding: 15px; margin-top: 50px; }
        
        
        input {
            margin-bottom: 15px;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <!-- Barre en haut -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Cafet Panini</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'home' %}">Accueil</a>
                <a class="nav-link" href="{% url 'students' %}">Étudiants</a>
                <a class="nav-link" href="{% url 'products' %}">Produits</a>
                
                {% if user.is_authenticated %}
                    <span class="nav-link" style="color: pink;">Bonjour {{ user.username }} !</span>
                    <a class="nav-link" href="{% url 'logout' %}">Déconnexion</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- carré principal -->
    <div class="mon-bloc-blanc shadow-sm">
        <h1> Espace Étudiant</h1>
        <p>Veuillez remplir vos informations ci-dessous.</p>
        <hr>

        <!-- connexion -->
        <form method="POST" style="max-width: 400px; margin: 0 auto; text-align: left;">
            {% csrf_token %} 
            
            <label>Votre Nom :</label>
            <input type="text" name="nom" placeholder="Ex: Jean Dupont">

            <label>Numéro d'étudiant :</label>
            <input type="number" name="id_student" placeholder="Ex: 2026001">

            <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
        </form>
    </div>

    <!-- Pied de page -->
    <div class="mon-footer text-center">
        <p>© 2026 Cafétéria ENSEA</p>
        <img src="https://i.postimg.cc/zGvbZwdw/logo-ensea.png" width="40">
    </div>

</body>
</html>
